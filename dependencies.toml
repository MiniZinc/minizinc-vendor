# =============================================================================
# minizinc-vendor dependency manifest — the single source of truth.
#
# Every third-party solver AND build-toolchain version that minizinc-vendor builds
# is pinned here. Each (dependency, platform) build is published as an asset on a
# per-dependency GitHub Release tagged `<dep>-<version>`, so consumers pin and
# download each dependency individually. Nothing floats.
#
# Tooling:
#   - manifest.py     : expands the (dependency x platform) build matrix and the
#                       release-tag / asset-name for each cell.
#   - update_check.py : the Dependabot-style upstream-update bot.
#
# Fields the update bot rewrites in place live on their OWN line (never inside an
# inline table): `version` for tag-tracked deps, `commit` for branch-tracked deps.
# =============================================================================

schema = 2

# -----------------------------------------------------------------------------
# Platforms. `platform` is the internal (libc-aware) build id; `triple` is the
# public system identifier used in release asset names and by consumers. Note
# `mznarch` is only a recipe input and is NOT the platform identity (musl maps to
# mznarch "linux", matching the historic GitLab behaviour).
#
# `container` MUST be pinned by digest for reproducibility — resolve the
# `@sha256:...` placeholders once and commit them (e.g.
# `docker buildx imagetools inspect quay.io/pypa/manylinux_2_28_x86_64`).
# -----------------------------------------------------------------------------
# Common public base images + a per-platform `setup` that installs build deps at
# job time (replaces the bespoke docker-build-environment images). manylinux_2_28
# pins a low glibc floor (2.28) — matching what the official Qt 6 Linux binaries
# need — while being an actively-maintained upstream image.
[platforms.linux]
runner    = "ubuntu-24.04"
container = "quay.io/pypa/manylinux_2_28_x86_64"                 # TODO: pin @sha256:...
mznarch   = "linux"
triple    = "x86_64-linux-gnu"
setup     = "dnf -y install zlib-devel patch which file 2>/dev/null || true"

[platforms.linux-arm64]
runner    = "ubuntu-24.04-arm"
container = "quay.io/pypa/manylinux_2_28_aarch64"                # TODO: pin @sha256:...
mznarch   = "linux-arm64"
triple    = "aarch64-linux-gnu"
setup     = "dnf -y install zlib-devel patch which file 2>/dev/null || true"

[platforms.musl]
runner    = "ubuntu-24.04"
container = "alpine:3.20"                                        # TODO: pin @sha256:...
mznarch   = "linux"
triple    = "x86_64-linux-musl"
setup     = "apk add --no-cache bash build-base cmake ninja git curl autoconf automake libtool pkgconf zlib-dev linux-headers"

[platforms.musl-arm64]
runner    = "ubuntu-24.04-arm"
container = "alpine:3.20"                                        # TODO: pin @sha256:...
mznarch   = "linux-arm64"
triple    = "aarch64-linux-musl"
setup     = "apk add --no-cache bash build-base cmake ninja git curl autoconf automake libtool pkgconf zlib-dev linux-headers"

[platforms.osx]
runner    = "macos-14"          # arm64 host; arm64-only builds (Intel Macs unsupported)
container = ""                  # native (no container)
mznarch   = "osx"
triple    = "aarch64-apple-darwin"

[platforms.win64]
runner    = "windows-2022"
container = ""                  # native
mznarch   = "win64"
triple    = "x86_64-windows"

[platforms.wasm]
runner    = "ubuntu-24.04"
container = "emscripten/emsdk:3.1.64"   # TODO: pin @sha256:...
mznarch   = "wasm"
triple    = "wasm32-emscripten"

# -----------------------------------------------------------------------------
# Toolchain. Pinned build tooling that is not itself a shipped solver but whose
# version changes the produced binaries. Tracked by the update bot.
# -----------------------------------------------------------------------------
[toolchain.coinbrew]
# Replaces the historic unpinned `curl .../coinbrew/master/coinbrew` in cbc.sh.
# coinbrew has no recent release (last tag v2.0 is from 2022 and lacks Windows
# fixes), so we pin a `master` commit and let the bot track the branch head —
# matching the old CI, which used master.
commit = "50539b4ea785cb2088366dc7f26930ec5c5b4546"
track  = { kind = "branch-head", repo = "https://github.com/coin-or/coinbrew", branch = "master" }

[toolchain.bazel]
version = "8.6.0"
track   = { kind = "github-release", repo = "bazelbuild/bazel", pattern = '^(\d+\.\d+\.\d+)$' }

[toolchain.bazelisk]
version = "v1.28.1"
track   = { kind = "github-release", repo = "bazelbuild/bazelisk", pattern = '^v(\d+\.\d+\.\d+)$' }
# sha256 of each release asset, verified before use. TODO: fill real digests.
[toolchain.bazelisk.sha256]
"linux-amd64"   = "TODO"
"linux-arm64"   = "TODO"
"darwin-amd64"  = "TODO"
"darwin-arm64"  = "TODO"
"windows-amd64" = "TODO"

[toolchain.rules_pkg]
# Consumed via resources/or-tools/MODULE.bazel (bazel_dep). Kept here for tracking;
# a bump must also edit resources/or-tools/MODULE.bazel.
version = "1.2.0"
track   = { kind = "bcr-module", module = "rules_pkg" }

[toolchain.openssl]
# Provenance only: the win64 runtime DLLs are checked in under resources/openssl-win64.
# The bot cannot auto-bump binary DLLs, so it opens an advisory issue instead.
version = "3.5.1"
track   = { kind = "manual" }

[toolchain.qt]
# Qt for gecode_gist. Downloaded on the fly via aqtinstall (in-container on linux;
# via install-qt-action on the native osx/win64 runners). Keep aligned with the
# MiniZincIDE's Qt. Qt 6's macOS build is universal (incl. arm64).
version = "6.5.3"
track   = { kind = "manual" }

# -----------------------------------------------------------------------------
# Dependencies (solvers). Each declares its recipe, the pinned version/commit, and
# which platforms it builds on. Real gaps are encoded explicitly (gecode_gist: no
# arm64/musl/wasm; or-tools: no wasm).
# -----------------------------------------------------------------------------

[deps.cbc]
recipe       = "recipes/cbc.sh"
version      = "2.10.13"
uses         = ["coinbrew"]
artifact_dir = "cbc"
platforms    = ["linux", "linux-arm64", "musl", "musl-arm64", "osx", "win64", "wasm"]
track        = { kind = "git-tags", repo = "https://github.com/coin-or/Cbc", pattern = 'releases/(\d+\.\d+\.\d+)' }
# CBC uses coinbrew (not CMake), so arch/MSVC flags go through CFLAGS/CXXFLAGS.
[deps.cbc.env.osx]
CFLAGS   = "-arch arm64"
CXXFLAGS = "-arch arm64"
[deps.cbc.env.win64]
CFLAGS   = "-MD -O2"
CXXFLAGS = "-MD -O2"

[deps.highs]
recipe       = "recipes/highs.sh"
version      = "v1.15.1"
artifact_dir = "highs"
platforms    = ["linux", "linux-arm64", "musl", "musl-arm64", "osx", "win64", "wasm"]
track        = { kind = "git-tags", repo = "https://github.com/ERGO-Code/HiGHS", pattern = 'v(\d+\.\d+\.\d+)' }

[deps.or-tools]
recipe       = "recipes/or-tools.sh"
version      = "v9.15"
uses         = ["bazel", "bazelisk", "rules_pkg"]
overlay      = "resources/or-tools"     # rebuilt in pr-validate if these files change
artifact_dir = "or-tools"
platforms    = ["linux", "linux-arm64", "musl", "musl-arm64", "osx", "win64"]   # no wasm
track        = { kind = "git-tags", repo = "https://github.com/google/or-tools", pattern = 'v(\d+\.\d+)' }

[deps.gecode]
recipe       = "recipes/gecode.sh"
# Branch-tracked (was a git submodule). `commit` is the reproducible pin used to
# build; the bot bumps it to the head of `track.branch`.
commit       = "eebbc1bfaef1decd3ab6a3c583c7b55f5fe29600"
artifact_dir = "gecode"
platforms    = ["linux", "linux-arm64", "musl", "musl-arm64", "osx", "win64", "wasm"]
track        = { kind = "branch-head", repo = "https://github.com/Gecode/gecode", branch = "release/6.3.0" }

[deps.gecode_gist]
recipe       = "recipes/gecode.sh"
gist         = true             # → gecode.sh 1
source_of    = "gecode"         # shares gecode's commit; never pinned independently
uses         = ["qt"]           # Qt: aqtinstall (linux container) / install-qt-action (osx, win64)
artifact_dir = "gecode_gist"
platforms    = ["linux", "osx", "win64"]   # NOT arm64 / musl / wasm
# Qt is installed on the fly: via aqtinstall inside the linux container, and via
# install-qt-action on the native osx/win64 runners.

[deps.chuffed]
recipe       = "recipes/chuffed.sh"
# TODO: track a stable branch/tag after Chuffed 0.14.0 (currently develop).
commit       = "b2595dd9f6b3bf0f58262fe1cca7bf19c1327fe4"
artifact_dir = "chuffed"
platforms    = ["linux", "linux-arm64", "musl", "musl-arm64", "osx", "win64", "wasm"]
track        = { kind = "branch-head", repo = "https://github.com/Chuffed/chuffed", branch = "develop" }
